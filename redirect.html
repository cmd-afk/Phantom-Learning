<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <meta name="robots" content="noindex" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #111827 0, #020617 40%, #000 100%);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .msg {
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
    <script>
      (function() {
        var SHEET_LOG_URL = "https://script.google.com/macros/s/AKfycbysghQ6N5jFJuELdCJEYX9rrDwNGrDIpRTMRnzdzVedWeU8K2bBPc2jGt-jpuymP3Fs/exec"; // Paste your Apps Script Web app URL here (from google-sheet-log.gs setup)
        try {
          localStorage.setItem("phantom-from-redirect", "1");
          var hash = location.hash && location.hash.slice(1);
          var email = "", name = "";
          if (hash) {
            var params = new URLSearchParams(hash);
            var idToken = params.get("id_token");
            if (idToken) {
              try {
                var payload = idToken.split(".")[1];
                if (payload) {
                  var json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
                  var data = JSON.parse(json);
                  if (data.email) { email = data.email; localStorage.setItem("phantom-user-email", data.email); }
                  if (data.name) { name = data.name; localStorage.setItem("phantom-user-name", data.name); }
                }
              } catch (e) {}
            }
          }
          if (SHEET_LOG_URL && (email || name)) {
            try {
              navigator.sendBeacon(SHEET_LOG_URL, JSON.stringify({
                email: email,
                name: name,
                time: new Date().toISOString()
              }));
            } catch (e) {
              fetch(SHEET_LOG_URL, {
                method: "POST",
                body: JSON.stringify({ email: email, name: name, time: new Date().toISOString() }),
                headers: { "Content-Type": "application/json" },
                keepalive: true
              }).catch(function() {});
            }
          }
        } catch (e) {}
        var target = "main.html";
        if (location.pathname && location.pathname.indexOf("redirect") !== -1) {
          target = location.pathname.replace("redirect.html", "main.html");
        }
        location.replace(target);
      })();
    </script>
  </head>
  <body>
    <div class="msg">Redirecting…</div>
  </body>
</html>
